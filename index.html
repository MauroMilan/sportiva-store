<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sport Store</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
  <link rel="stylesheet" href="./style.css">
</head>

<body>

  <!--ENCABEZADO-->
  <nav class="navbar navbar-dark navbarSportiva">
    <a class="navbar-brand" href="#">
      <img src="./logosportiva.png" width="100" height="45" alt="Logo de Sportiva">
    </a>
  </nav>

  <!--BANNER INICIAL-->

  <section class="hero">

    <div class="heroContenido d-flex  justify-content-between h-100">

      <!--texoIzquierdo-->

      <div class="textoHero d-flex flex-column ">
        <h2 class="pasion">PASIÓN</h2>
        <h1 class="mundial"> MUNDIAL 2026</h1>
        <h2 class="torneo d-flex m-2"> El torneo del siglo</h2>
        <div class="preparate d-flex flex-column align-items-center">
          <p> Prepárate para el torneo más grande de la historia.</p>
          <p>Vive la emoción del Mundial 2026 </p>
          <p>con lo mejor del deporte. </p>

        </div>
      </div>

      <!--oferta-->

      <div class="promo d-flex flex-column">
        <div class="textoPromo">
          <div class="oferta"> ¡OFERTA IMPERDIBLE! </div>
          <div class="hasta"> HASTA</div>



          <div class="descuento">60%</div>

          <div class="off"> OFF</div>
          <div class="productos"> EN PRODUCTOS</div>
          <h3 class="seleccionados"> SELECCIONADOS</h3>
        </div>

        <!--CTA-->
        <div class="botonPromo d-flex flex-column align-items-center mt-4">
          <a href="#" class="btn btn-success btnSportiva mt-1">
            COMPRAR AHORA
          </a>
          <div class="valido"> *VALIDO POR TIEMPO LIMITADO</div>
        </div>

      </div>

    </div>


  </section>

  
    <div class="form">
        <h5>CONSIGUE TU DESCUENTO DE 10%</h5>
        <div class="mb-3">
            <label for="name" class="form-label">Nombre</label>
            <input type="text" class="form-control" id="name" placeholder="Nombre completo">
        </div>
        <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" placeholder="Correo electrónico">
        </div>
        <div class="mb-3">
            <label for="phone" class="form-label">Contacto</label>
            <input type="text" class="form-control" id="phone" placeholder="Número de teléfono">
        </div>
        <div class= "button-container">
            <button type="button" class="btn">APLICAR DESCUENTO ESPECIAL</button>
        </div>
    </div>
   
  <script src="./main.js" type="module"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
</body>

</html>
